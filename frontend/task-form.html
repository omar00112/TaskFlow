<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Nouvelle tâche</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h1 {
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, textarea, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .draft-banner {
            display: none;
            background-color: #fff3cd;
            border: 1px solid #ffeeba;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .btn-success {
            background-color: #28a745;
        }
        .btn-success:hover {
            background-color: #1e7e34;
        }
        .btn-danger {
            background-color: #dc3545;
        }
        .btn-danger:hover {
            background-color: #b02a37;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1> Nouvelle tâche</h1>

        <div id="draftBanner" class="draft-banner">
             Un brouillon non sauvegardé a été trouvé.
            <button onclick="restoreDraft()" class="btn-success">Restaurer</button>
            <button onclick="deleteDraft()" class="btn-danger">Ignorer</button>
        </div>

        <form id="taskForm">
            <div class="form-group">
                <label>Titre *</label>
                <input type="text" id="title" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="description" rows="4"></textarea>
            </div>
            <div class="form-group">
                <label>Priorité</label>
                <select id="priority">
                    <option value="basse">Basse</option>
                    <option value="moyenne" selected>Moyenne</option>
                    <option value="haute">Haute</option>
                </select>
            </div>
            <div class="form-group">
                <label>Statut</label>
                <select id="status">
                    <option value="à faire">À faire</option>
                    <option value="en cours">En cours</option>
                    <option value="terminé">Terminé</option>
                </select>
            </div>
                <!-- Champ caché pour stocker l'ID du projet -->
    <input type="hidden" id="projectIdInput" value="">

    <!-- Affichage du nom du projet -->
    <div class="form-group">
        <label>Projet</label>
        <input type="text" id="projectName" readonly disabled style="background-color:#f0f0f0">
    </div>

    <button type="submit">Créer la tâche</button>
            <button type="submit">Créer la tâche</button>
        </form>
    </div>

    <script src="js/task-form.js"></script>
</body>
</html>
