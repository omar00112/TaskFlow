<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Connexion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>TaskFlow</h1>

    <!-- Formulaire de Connexion -->
    <div id="login-form">
        <h2>Connexion</h2>
        <input type="email" id="login-email" placeholder="Email" required>
        <input type="password" id="login-password" placeholder="Mot de passe" required>
        <button onclick="login()">Se connecter</button>
        <p>Pas de compte? <span onclick="showRegister()">S'inscrire</span></p>
    </div>

    <!-- Formulaire d'Inscription -->
    <div id="register-form" style="display:none">
        <h2>Inscription</h2>
        <input type="text" id="register-name" placeholder="Nom complet" required>
        <input type="email" id="register-email" placeholder="Email" required>
        <input type="password" id="register-password" placeholder="Mot de passe" required>
        <button onclick="register()">S'inscrire</button>
        <p>Déjà un compte? <span onclick="showLogin()">Se connecter</span></p>
    </div>

    <p id="message"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script>
    const API_URL = 'http://localhost:3000/api/auth';

    window.onload = function() {
        const token = localStorage.getItem('token');
        if (token) {
            // Already logged in → go to dashboard
            window.location.href = 'dashboard.html';
        }
    };

    function showLogin() {
        clearMessage();
        document.getElementById('login-form').style.display = 'block';
        document.getElementById('register-form').style.display = 'none';
    }

    function showRegister() {
        clearMessage();
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('register-form').style.display = 'block';
    }

    function displayMessage(text, isSuccess = false) {
        const msg = document.getElementById('message');
        msg.innerText = text;
        msg.className = isSuccess ? 'success' : 'error';
    }

    function clearMessage() {
        document.getElementById('message').innerText = '';
        document.getElementById('message').className = '';
    }

    async function register() {
        const fullName = document.getElementById('register-name').value;
        const email = document.getElementById('register-email').value;
        const password = document.getElementById('register-password').value;

        if (!fullName || !email || !password) {
            return displayMessage("Tous les champs sont obligatoires");
        }
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
            return displayMessage("Format d'email invalide");
        }
        if (password.length < 6) {
            return displayMessage("Le mot de passe doit faire au moins 6 caractères");
        }

        try {
            const res = await axios.post(`${API_URL}/register`, { fullName, email, password });
            displayMessage(res.data.message || "Inscription réussie !", true);
            setTimeout(() => showLogin(), 2000);
        } catch (err) {
            const errorMsg = err.response?.data?.message || "Erreur lors de l'inscription";
            displayMessage(errorMsg);
        }
    }

    async function login() {
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;

        if (!email || !password) {
            return displayMessage("Veuillez remplir tous les champs");
        }

        try {
            const res = await axios.post(`${API_URL}/login`, { email, password });
            localStorage.setItem('token', res.data.token);
            // Redirect to dashboard
            window.location.href = 'dashboard.html';
        } catch (err) {
            const errorMsg = err.response?.data?.message || "Identifiants incorrects";
            displayMessage(errorMsg);
        }
    }
</script>
</body>
</html>
