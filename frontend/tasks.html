<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - TÃ¢ches</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .task-item { background: #f9f9f9; border: 1px solid #ddd; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
        .task-title { font-weight: bold; }
        .task-meta { font-size: 0.9em; color: #555; margin-top: 5px; }
        
      
        .filter-group label {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 4px;
            display: block;
        }
        .filter-group select, .filter-group input {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .filter-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        @media (max-width: 750px) {
            .filter-bar {
                flex-wrap: wrap;
            }
            .filter-group {
                min-width: 140px;
            }
        }
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
        }
        .pagination button {
            background: #3498db;
            padding: 6px 12px;
            font-size: 14px;
        }
        .pagination button:disabled {
            background: #aaa;
            cursor: not-allowed;
        }
        .filter-group input,
        .filter-group select {
            width: 100%;
            box-sizing: border-box;
        }
        .filter-group {
            min-width: 0;
            flex: 1;
            overflow: hidden; 
        }
    </style>
</head>
<body>
<div class="container" style="max-width: 900px;">
    <div class="header-right">
        <button onclick="window.location.href='dashboard.html'" style="background:#4a90e2; padding:6px 12px;">â† Retour au tableau de bord</button>
        <button onclick="logout()" class="logout-btn">Se dÃ©connecter</button>
    </div>

    <div class="welcome">
        <h2>Gestion des tÃ¢ches</h2>
        <p id="projectTitle"></p>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3>ðŸ“‹ Liste des tÃ¢ches</h3>
            <button onclick="createTask()">+ Nouvelle tÃ¢che</button>
        </div>

        <!-- Filtres â€“ all in one line -->
        <div class="filter-bar">
            <div class="filter-group">
                <label>Statut</label>
                <select id="filterStatus">
                    <option value="">Tous</option>
                    <option value="Ã  faire">Ã€ faire</option>
                    <option value="en cours">En cours</option>
                    <option value="terminÃ©">TerminÃ©</option>
                </select>
            </div>
            <div class="filter-group">
                <label>PrioritÃ©</label>
                <select id="filterPriority">
                    <option value="">Toutes</option>
                    <option value="basse">Basse</option>
                    <option value="moyenne">Moyenne</option>
                    <option value="haute">Haute</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Recherche (titre)</label>
                <input type="text" id="filterSearch" placeholder="Mots-clÃ©s...">
            </div>
            <div class="filter-actions">
                <button onclick="applyFilters()">Filtrer</button>
                <button onclick="resetFilters()" style="background:#95a5a6;">RÃ©initialiser</button>
            </div>
        </div>

        <div id="tasksList"></div>

        <!-- Pagination -->
        <div class="pagination" id="paginationControls" style="display: none;">
            <button id="prevPageBtn" onclick="changePage(-1)">â—€ PrÃ©cÃ©dent</button>
            <span id="pageInfo">Page 1 / 1</span>
            <button id="nextPageBtn" onclick="changePage(1)">Suivant â–¶</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script>
    const API_BASE = 'http://localhost:3000/api';
    let projectId = null;
    let currentPage = 1;
    const limit = 5;
    let totalPages = 1;

    window.onload = async () => {
        const token = localStorage.getItem('token');
        if (!token) { window.location.href = 'index.html'; return; }
        axios.defaults.headers.common['Authorization'] = 'Bearer ' + token;

        const urlParams = new URLSearchParams(window.location.search);
        projectId = urlParams.get('projectId');
        if (!projectId) {
            alert("Aucun projet sÃ©lectionnÃ©");
            window.location.href = 'dashboard.html';
            return;
        }
        await loadProjectInfo();
        await loadTasks();
    };

    async function loadProjectInfo() {
        try {
            const res = await axios.get(`${API_BASE}/projects/${projectId}`);
            document.getElementById('projectTitle').innerHTML = `<strong>Projet :</strong> ${escapeHtml(res.data.title)}`;
        } catch (err) { console.error(err); }
    }

    async function loadTasks() {
        const status = document.getElementById('filterStatus').value;
        const priority = document.getElementById('filterPriority').value;
        const search = document.getElementById('filterSearch').value.trim();

        let url = `${API_BASE}/tasks/project/${projectId}?page=${currentPage}&limit=${limit}`;
        if (status) url += `&status=${encodeURIComponent(status)}`;
        if (priority) url += `&priority=${encodeURIComponent(priority)}`;
        if (search) url += `&search=${encodeURIComponent(search)}`;

        try {
            const res = await axios.get(url);
            const tasks = res.data.data;
            totalPages = res.data.totalPages;
            updatePaginationControls();

            const container = document.getElementById('tasksList');
            if (!tasks.length) {
                container.innerHTML = '<p>Aucune tÃ¢che correspondante.</p>';
                return;
            }
            container.innerHTML = tasks.map(task => {
                let dueDateHtml = '';
                if (task.dueDate) {
                    const formattedDate = new Date(task.dueDate).toLocaleDateString('fr-FR');
                    dueDateHtml = ` | Ã‰chÃ©ance : ${formattedDate}`;
                }
                return `
                <div class="task-item">
                    <div class="task-title">${escapeHtml(task.title)}</div>
                    <div class="task-meta">
                        PrioritÃ©: ${task.priority} | Statut: 
                        <select onchange="updateStatus('${task._id}', this.value)">
                            <option value="Ã  faire" ${task.status === 'Ã  faire' ? 'selected' : ''}>Ã€ faire</option>
                            <option value="en cours" ${task.status === 'en cours' ? 'selected' : ''}>En cours</option>
                            <option value="terminÃ©" ${task.status === 'terminÃ©' ? 'selected' : ''}>TerminÃ©</option>
                        </select>
                        ${dueDateHtml}
                        ${task.assignedTo ? `| AssignÃ© Ã : ${task.assignedTo.fullName || task.assignedTo.email}` : ''}
                    </div>
                    <div class="task-actions">
                        <button onclick="deleteTask('${task._id}')">ðŸ—‘ï¸ Supprimer</button>
                    </div>
                </div>
            `}).join('');
        } catch (err) {
            console.error(err);
            document.getElementById('tasksList').innerHTML = '<p>Erreur de chargement.</p>';
        }
    }

    function updatePaginationControls() {
        const controls = document.getElementById('paginationControls');
        if (totalPages <= 1) {
            controls.style.display = 'none';
        } else {
            controls.style.display = 'flex';
            document.getElementById('pageInfo').innerText = `Page ${currentPage} / ${totalPages}`;
            document.getElementById('prevPageBtn').disabled = (currentPage === 1);
            document.getElementById('nextPageBtn').disabled = (currentPage === totalPages);
        }
    }

    function changePage(delta) {
        const newPage = currentPage + delta;
        if (newPage < 1 || newPage > totalPages) return;
        currentPage = newPage;
        loadTasks();
    }

    function applyFilters() {
        currentPage = 1;
        loadTasks();
    }

    function resetFilters() {
        document.getElementById('filterStatus').value = '';
        document.getElementById('filterPriority').value = '';
        document.getElementById('filterSearch').value = '';
        currentPage = 1;
        loadTasks();
    }

    async function updateStatus(taskId, newStatus) {
        try {
            await axios.patch(`${API_BASE}/tasks/${taskId}/status`, { status: newStatus });
            loadTasks();
        } catch (err) { alert("Erreur mise Ã  jour du statut"); }
    }

    async function deleteTask(taskId) {
        if (!confirm("Supprimer cette tÃ¢che ?")) return;
        try {
            await axios.delete(`${API_BASE}/tasks/${taskId}`);
            const remaining = document.querySelectorAll('.task-item').length;
            if (remaining === 1 && currentPage > 1) currentPage--;
            loadTasks();
        } catch (err) { alert("Erreur suppression"); }
    }

    function createTask() {
        window.location.href = `task-form.html?projectId=${projectId}`;
    }

    function logout() {
        localStorage.removeItem('token');
        window.location.href = 'index.html';
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }
</script>
</body>
</html>
